name: Sync Environment Variables to Vercel

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/vercel-env-sync.yml'
  workflow_dispatch:

jobs:
  sync-env:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Set Environment Variables
        run: |
          echo "Setting environment variables in Vercel..."
          
          # Supabase
          vercel env add NEXT_PUBLIC_SUPABASE_URL production --token=${{ secrets.VERCEL_TOKEN }} <<< "${{ vars.NEXT_PUBLIC_SUPABASE_URL }}"
          vercel env add NEXT_PUBLIC_SUPABASE_ANON_KEY production --token=${{ secrets.VERCEL_TOKEN }} <<< "${{ secrets.SUPABASE_ANON_KEY }}"
          
          # Agent Auth
          vercel env add AGENT_SECRET_KEY production --token=${{ secrets.VERCEL_TOKEN }} <<< "${{ secrets.AGENT_SECRET_KEY }}"
          vercel env add CRON_SECRET production --token=${{ secrets.VERCEL_TOKEN }} <<< "${{ secrets.CRON_SECRET }}"
          
          # App URL
          vercel env add NEXT_PUBLIC_APP_URL production --token=${{ secrets.VERCEL_TOKEN }} <<< "${{ vars.NEXT_PUBLIC_APP_URL }}"
          
          # Sync Settings
          vercel env add LIVE_SYNC_ENABLED production --token=${{ secrets.VERCEL_TOKEN }} <<< "true"
          
          echo "✅ Environment variables synced to Vercel"
